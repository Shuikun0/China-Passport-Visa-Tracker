<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国护照签证状态展示（静态清单）</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">🗺️</text></svg>' />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --ok: #16a34a;
      --input-bg: #ffffff;
      --tooltip-bg: #ffffff;
      --tooltip-border: #cbd5e1;
      --tooltip-text: #0f172a;
      --stat-bg: #ffffff;
      --stat-border: #e5e7eb;
      --map-land: #d1d5db;
      --map-coast: #d1d5db;
      --map-country: #a8b3c2;
      --map-ocean: #e6f2ff;
      --map-lake: #cfe8ff;
      --map-bg: #ffffff;
    }
    body.dark {
      --bg: #0b1220;
      --card: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #1f2937;
      --primary: #3b82f6;
      --ok: #22c55e;
      --input-bg: #111827;
      --tooltip-bg: #0f172a;
      --tooltip-border: #334155;
      --tooltip-text: #e5e7eb;
      --stat-bg: #111827;
      --stat-border: #1f2937;
      --map-land: #334155;
      --map-coast: #475569;
      --map-country: #64748b;
      --map-ocean: #0b2447;
      --map-lake: #12325f;
      --map-bg: #0f172a;
    }
    * { box-sizing: border-box; }
    html, body {
      overscroll-behavior-x: none;
      overscroll-behavior-y: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(100, 116, 139, 0.45) transparent;
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    html::-webkit-scrollbar-track, body::-webkit-scrollbar-track {
      background: transparent;
    }
    html::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.45);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    html::-webkit-scrollbar-thumb:hover, body::-webkit-scrollbar-thumb:hover {
      background: rgba(100, 116, 139, 0.62);
      background-clip: content-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    .wrap { max-width: 1120px; margin: 24px auto; padding: 0 16px 28px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .hint { margin: 0 0 16px; color: var(--muted); font-size: 12px; line-height: 1.45; opacity: 0.72; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 10px;
      align-items: center;
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      background: var(--input-bg);
      color: var(--text);
    }
    button {
      cursor: pointer;
      border-color: transparent;
      background: var(--primary);
      color: #fff;
      width: auto;
      padding: 10px 14px;
    }
    .stats {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      margin-top: 10px;
    }
    .map-wrap {
      width: 100%;
      aspect-ratio: 2 / 1;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }
    .map-box {
      position: relative;
    }
    .map-tooltip {
      position: absolute;
      z-index: 20;
      min-width: 230px;
      max-width: 320px;
      background: var(--tooltip-bg);
      border: 1px solid var(--tooltip-border);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      padding: 10px 12px;
      pointer-events: none;
      display: none;
      font-size: 12px;
      color: var(--tooltip-text);
      line-height: 1.45;
    }
    .table-tooltip {
      position: fixed;
      z-index: 30;
      display: none;
    }
    .country-panel {
      position: fixed;
      left: 16px;
      top: 84px;
      width: min(360px, calc(100vw - 24px));
      max-height: calc(100vh - 108px);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      box-shadow: 0 16px 40px rgba(2, 6, 23, 0.18);
      overflow: hidden;
      z-index: 45;
      transform: translateX(-112%);
      opacity: 0;
      pointer-events: none;
      transition: transform .22s ease, opacity .2s ease;
    }
    .country-panel.is-open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }
    .country-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
    }
    .country-panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .country-panel-close {
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      font-size: 16px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .country-panel-body {
      padding: 12px;
      overflow: auto;
      max-height: calc(100vh - 172px);
    }
    .panel-links {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      display: grid;
      gap: 8px;
    }
    .panel-link-row {
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }
    .panel-link-row a {
      color: var(--primary);
      text-decoration: none;
      word-break: break-all;
    }
    .panel-link-row a:hover { text-decoration: underline; }
    .map-tooltip-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .map-tooltip-chip {
      display: inline-flex;
      vertical-align: middle;
      margin-left: 6px;
      padding: 1px 8px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #374151;
    }
    .chip-free { border-color: #93c5fd; background: #eff6ff; color: #1e3a8a; }
    .chip-arrival { border-color: #86efac; background: #f0fdf4; color: #166534; }
    .chip-evisa { border-color: #fde047; background: #fefce8; color: #854d0e; }
    .chip-regular { border-color: #d1d5db; background: #f9fafb; color: #374151; }
    .diff-meter {
      display: inline-flex;
      gap: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .diff-mark {
      font-weight: 700;
      opacity: 0.28;
      color: #94a3b8;
      line-height: 1;
    }
    .diff-mark.on-1 { color: #3b82f6; opacity: 1; }
    .diff-mark.on-2 { color: #22c55e; opacity: 1; }
    .diff-mark.on-3 { color: #eab308; opacity: 1; }
    .diff-mark.on-4 { color: #fb8c00; opacity: 1; }
    .diff-mark.on-5 { color: #8e24aa; opacity: 1; }
    .ease-text {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      margin-left: 4px;
      vertical-align: middle;
    }
    .ease-1 { color: #3b82f6; }
    .ease-2 { color: #22c55e; }
    .ease-3 { color: #eab308; }
    .ease-4 { color: #fb8c00; }
    .ease-5 { color: #8e24aa; }
    .map-tooltip-label {
      color: #64748b;
      font-size: 11px;
      margin-top: 3px;
    }
    .map-tooltip-value {
      margin-top: 1px;
      font-size: 11px;
      line-height: 1.4;
      word-break: break-word;
    }
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--input-bg);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }
    .theme-toggle:hover {
      border-color: var(--line);
    }
    .map-legend {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }
    .map-bottom {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .map-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .mode-toggle-btn {
      border: 1px solid var(--line);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
    }
    .map-legend-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      justify-content: flex-end;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 11px;
      height: 11px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .stat {
      flex: 1 1 0;
      min-width: 120px;
      border: 1px solid var(--stat-border);
      border-radius: 10px;
      padding: 10px;
      background: var(--stat-bg);
      cursor: pointer;
      transition: border-color .18s ease, box-shadow .18s ease, transform .12s ease;
      position: relative;
      overflow: hidden;
    }
    .stat:hover {
      border-color: var(--primary);
    }
    .stat:active {
      transform: translateY(1px);
    }
    .stat.is-selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18) inset;
    }
    .stat-bg-flags {
      position: absolute;
      left: -16%;
      top: -28%;
      width: 132%;
      height: 160%;
      pointer-events: none;
      user-select: none;
      font-size: 15px;
      line-height: 1.45;
      letter-spacing: 1px;
      white-space: normal;
      overflow: hidden;
      opacity: 0.07;
      filter: saturate(0.85);
      transform: rotate(-14deg);
      transform-origin: center center;
      z-index: 0;
    }
    .stat-label, .stat-value { position: relative; z-index: 1; }
    .stat-label { color: var(--muted); font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .table-wrap { overflow: auto; }
    .list-search {
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
      table-layout: fixed;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      font-size: 14px;
      vertical-align: top;
      text-align: left;
    }
    th { color: var(--muted); font-weight: 600; font-size: 13px; }
    th.sortable { cursor: pointer; user-select: none; }
    th.col-country, td.col-country { width: 220px; }
    th.col-type, td.col-type { width: 110px; }
    .ellipsis {
      display: block;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tag {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .tag-free { background: #eff6ff; color: #1e3a8a; }
    .tag-arrival { background: #f0fdf4; color: #166534; }
    .tag-evisa { background: #fefce8; color: #854d0e; }
    .tag-regular { background: #f3f4f6; color: #374151; }
    .meta {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .ok { color: var(--ok); }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 900px) {
      .toolbar { grid-template-columns: 1fr; }
      .stats { flex-wrap: wrap; }
      .stat { min-width: calc(50% - 8px); }
    }
    @media (max-width: 860px) {
      .country-panel {
        left: 10px;
        top: auto;
        bottom: 10px;
        width: calc(100vw - 20px);
        max-height: 56vh;
      }
      .country-panel-body { max-height: calc(56vh - 58px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>🌏 中国护照签证便利度追踪</h1>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换夜间模式" title="切换日间/夜间">☀</button>
    </div>
    <p class="hint">
      本页面部分数据由非常牛逼的 AI 基于网络公开信息抓取整理，可能存在不准确或滞后；建议您双重核实实际情况。最后更新于 2026-04-20。
    </p>

    <div class="card">
      <div class="map-box">
        <div id="worldMap" class="map-wrap"></div>
        <div id="mapTooltip" class="map-tooltip"></div>
      </div>
      <div class="map-bottom">
        <div class="map-controls">
          <button id="difficultyModeToggle" class="mode-toggle-btn" type="button" aria-label="切换地图着色模式">按签证容易度着色</button>
        </div>
        <div id="legendType" class="map-legend-group">
          <span class="legend-item"><span class="legend-swatch" style="background:#3b82f6;"></span>免签</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#22c55e;"></span>落地签</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#facc15;"></span>电子签</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#6b7280;"></span>常规签</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#d1d5db;"></span>无信息</span>
        </div>
        <div id="legendDifficulty" class="map-legend-group" style="display:none;">
          <span class="legend-item"><span class="legend-swatch" style="background:#3b82f6;"></span>非常简易</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#22c55e;"></span>较为简易</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#eab308;"></span>常规</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#fb8c00;"></span>较困难</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#8e24aa;"></span>非常困难</span>
          <span class="legend-item"><span class="legend-swatch" style="background:#d1d5db;"></span>无信息</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="stats">
        <div id="statFree" class="stat"><div id="flagsFree" class="stat-bg-flags" aria-hidden="true"></div><div class="stat-label">免签</div><div id="countFree" class="stat-value">0</div></div>
        <div id="statArrival" class="stat"><div id="flagsArrival" class="stat-bg-flags" aria-hidden="true"></div><div class="stat-label">落地签</div><div id="countArrival" class="stat-value">0</div></div>
        <div id="statEvisa" class="stat"><div id="flagsEvisa" class="stat-bg-flags" aria-hidden="true"></div><div class="stat-label">电子签</div><div id="countEvisa" class="stat-value">0</div></div>
        <div id="statRegular" class="stat"><div id="flagsRegular" class="stat-bg-flags" aria-hidden="true"></div><div class="stat-label">常规签</div><div id="countRegular" class="stat-value">0</div></div>
      </div>
      <div class="meta">
        <span id="totalText">共 0 条</span>
      </div>
    </div>

    <div class="card">
      <div class="list-search">
        <input id="searchInput" type="text" placeholder="搜索国家..." />
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th id="sortCountry" class="col-country">国家/地区</th>
              <th id="sortType" class="col-type">分类</th>
              <th>备注</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

  </div>
  <div id="tableTooltip" class="map-tooltip table-tooltip"></div>
  <aside id="countryPanel" class="country-panel" aria-hidden="true">
    <div class="country-panel-head">
      <span class="country-panel-title">国家详情</span>
      <button id="countryPanelClose" class="country-panel-close" type="button" aria-label="关闭国家详情">×</button>
    </div>
    <div id="countryPanelBody" class="country-panel-body"></div>
  </aside>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    function closeCountryPanel() {
      if (!countryPanelEl) return;
      countryPanelEl.classList.remove("is-open");
      countryPanelEl.setAttribute("aria-hidden", "true");
    }

    }

    const TYPE_SORT_ORDER = { "免签": 0, "落地签": 1, "电子签": 2, "常规签": 3 };
    const applySort = (rows) => {
      if (sortKey === "type") {
        rows.sort((a, b) => {
          const t = (TYPE_SORT_ORDER[a.type] ?? 99) - (TYPE_SORT_ORDER[b.type] ?? 99);
          if (t !== 0) return t;
          return a.country.localeCompare(b.country);
        });
        return;
      }
      rows.sort((a, b) => a.country.localeCompare(b.country));
    };

    function norm(str) {
      return String(str || "").replace(/\s+/g, " ").trim();
    }

    function loadTheme() {
      try {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved === "light" || saved === "dark") return saved;
      } catch (_) {}
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function applyTheme(theme) {
      const dark = theme === "dark";
      document.body.classList.toggle("dark", dark);
      if (themeToggle) {
        themeToggle.textContent = "☀";
        themeToggle.setAttribute("aria-label", dark ? "切换到日间模式" : "切换到夜间模式");
        themeToggle.setAttribute("title", dark ? "切换到日间模式" : "切换到夜间模式");
      }
    }

    function stripRefs(str) {
      return norm(str).replace(/\[\d+\]/g, "").replace(/\s{2,}/g, " ").trim();
    }

      if (type === "免签") return "tag-free";

      if (type === "电子签") return "tag-evisa";
      return "tag-regular";

    function getVisaDifficulty(type, iso3, rawRequirement, note, countryEn) {
      const t = norm(type);
      if (t === "免签" || t === "落地签") return 1;
      if (t !== "电子签" && t !== "常规签") return null;

      const en = norm(countryEn).toLowerCase();
      const alias = COUNTRY_NAME_ALIASES[en] || en;
      if (USER_DIFFICULTY_BY_COUNTRY.has(alias)) return USER_DIFFICULTY_BY_COUNTRY.get(alias);

      const code = norm(iso3).toUpperCase();
      if (SCHENGEN_ISO3.has(code)) return 3;
      return t === "电子签" ? 2 : 3;
    }

    function getDifficultyMeterHtml(level) {
      const n = Number(level || 0);
      if (!n || n < 1 || n > 5) return "";
      let html = "<span class='diff-meter' aria-label='签证难度 " + n + " / 5'>";
      for (let i = 1; i <= 5; i += 1) {
        const active = i <= n ? "on-" + n : "";
        html += "<span class='diff-mark " + active + "'>!</span>";
      }
      html += "</span>";
      return html;
    }

    function getEaseDisplayHtml(type, level) {
      const t = norm(type);
      if (t === "免签" || t === "落地签") {
        return getDifficultyMeterHtml(1) + "<span class='ease-text ease-1'>非常容易（" + escapeHtml(t) + "）</span>";
      }
      const n = Number(level || 0);
      const meta = VISA_DIFFICULTY_META[n];
      if (!meta) return "";
      return getDifficultyMeterHtml(n) + "<span class='ease-text " + meta.className + "'>" + meta.text + "</span>";
    }

    function getDifficultyMeterPlain(level) {
      const n = Number(level || 0);
      if (!n || n < 1 || n > 5) return "";
      return "!".repeat(n) + "·".repeat(5 - n);
    }

    function render() {
      allRows = STATIC_VISA_DATA
        .map((r) => ({
          country: norm(r.country),
          country_en: norm(r.country_en),
          iso3: norm(r.iso3),
          type: ["免签", "落地签", "电子签", "常规签"].includes(r.type) ? r.type : "常规签",
          rawRequirement: stripRefs(r.rawRequirement),
          stay: stripRefs(r.stay),
          note: stripRefs(r.note),
          difficulty: getVisaDifficulty(r.type, r.iso3, r.rawRequirement, r.note, r.country_en)
        }))
        .filter((r) => r.country)
        .sort((a, b) => a.country.localeCompare(b.country));

      const keyword = searchInput.value.trim().toLowerCase();
      const typeMatches = (r) => selectedTypes.size === 0 || selectedTypes.has(r.type);

      const shown = allRows.filter((r) => {
        const typeOk = typeMatches(r);
        const text = r.country.toLowerCase();
        const textOk = !keyword || text.includes(keyword);
        return typeOk && textOk;
      });
      applySort(shown);

      const counts = {
        "免签": 0,
        "落地签": 0,
        "电子签": 0,
        "常规签": 0
      };
      allRows.forEach((r) => { counts[r.type] += 1; });

      countFree.textContent = counts["免签"];
      countArrival.textContent = counts["落地签"];
      countEvisa.textContent = counts["电子签"];
      countRegular.textContent = counts["常规签"];
      if (flagsFree) flagsFree.textContent = "";
      if (flagsArrival) flagsArrival.textContent = "";
      if (flagsEvisa) flagsEvisa.textContent = "";
      if (flagsRegular) flagsRegular.textContent = "";
      const hasFilter = selectedTypes.size > 0 || Boolean(keyword);
      totalText.textContent = "共 " + shown.length + " 条" + (hasFilter ? "（筛选后）" : "");

      const totalForRatio = Math.max(1, allRows.length);
      const setStatFlex = (el, n) => {
        // Keep minimum visibility while still reflecting ratio.
        const ratio = n / totalForRatio;
        const weight = Math.max(0.55, ratio * 10);
        el.style.flex = weight.toFixed(3) + " 1 0";
      };
      setStatFlex(statFree, counts["免签"]);
      setStatFlex(statArrival, counts["落地签"]);
      setStatFlex(statEvisa, counts["电子签"]);
      setStatFlex(statRegular, counts["常规签"]);
      statFree.classList.toggle("is-selected", selectedTypes.has("免签"));
      statArrival.classList.toggle("is-selected", selectedTypes.has("落地签"));
      statEvisa.classList.toggle("is-selected", selectedTypes.has("电子签"));
      statRegular.classList.toggle("is-selected", selectedTypes.has("常规签"));

      rowsEl.innerHTML = "";
      if (!shown.length) {
        rowsEl.innerHTML = '<tr><td colspan="3">没有匹配结果。</td></tr>';
        return;
      }

      shown.forEach((r) => {
        const tr = document.createElement("tr");
        const infoText = r.note || "无";
        const countryLabel = getFlagEmoji(r.iso3) + " " + r.country;
        tr.innerHTML = [
          '<td class="col-country"><span class="ellipsis">' + escapeHtml(countryLabel) + "</span></td>",
          '<td class="col-type"><span class="tag ' + getTagClass(r.type) + '">' + r.type + "</span></td>",
          '<td><span class="ellipsis">' + escapeHtml(infoText) + "</span></td>"
        ].join("");
        tr.addEventListener("mouseenter", (evt) => {
          if (!tableTooltipEl) return;
          tableTooltipEl.innerHTML = buildTooltipHtmlFromRecord(r);
          tableTooltipEl.style.display = "block";
          placeFixedTooltip(tableTooltipEl, evt);
        });
        tr.addEventListener("mousemove", (evt) => {
          if (!tableTooltipEl || tableTooltipEl.style.display === "none") return;
          placeFixedTooltip(tableTooltipEl, evt);
        });
        tr.addEventListener("mouseleave", () => {
          if (tableTooltipEl) tableTooltipEl.style.display = "none";
        });
        tr.addEventListener("click", () => {
          openCountryPanel(r);
        });
        rowsEl.appendChild(tr);
      });

      // Performance: map updates only when type filter changes, not on each search keystroke.
      const key = selectedTypes.size ? Array.from(selectedTypes).sort().join("|") : "__ALL__";
      if (lastMapFilterKey !== key) {
        lastMapFilterKey = key;
        scheduleMapRender(getMapRowsForCurrentFilter());
      }
    }

    function getMapRowsForCurrentFilter() {
      if (selectedTypes.size === 0) return allRows;
      return allRows.filter((r) => selectedTypes.has(r.type));
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function typeToValue(type) {
      if (type === "免签") return 0;
      if (type === "落地签") return 1;
      if (type === "电子签") return 2;
      return 3;
    }

    function formatHoverText(text, maxPerLine) {
      const raw = norm(text);
      if (!raw) return "无";
      return escapeHtml(raw);
    }

    function getTypeBadgeHtml(type) {
      if (type === "免签") {
        return "<span style='display:inline-block;margin:2px 0 6px;padding:1px 8px;border:1px solid #86efac;border-radius:999px;color:#166534;background:#f0fdf4;'>免签</span>";
      }
      if (type === "落地签") {
        return "<span style='display:inline-block;margin:2px 0 6px;padding:1px 8px;border:1px solid #93c5fd;border-radius:999px;color:#1e3a8a;background:#eff6ff;'>落地签</span>";
      }
      if (type === "电子签") {
        return "<span style='display:inline-block;margin:2px 0 6px;padding:1px 8px;border:1px solid #fde047;border-radius:999px;color:#854d0e;background:#fefce8;'>电子签</span>";
      }
      return "<span style='display:inline-block;margin:2px 0 6px;padding:1px 8px;border:1px solid #d1d5db;border-radius:999px;color:#374151;background:#f9fafb;'>常规签</span>";
    }

    function getRegionDisplayName(iso2, fallbackName) {
      const code = String(iso2 || "").toUpperCase();
      if (code === "TW") return "中国台湾";
      try {
        if (typeof Intl !== "undefined" && Intl.DisplayNames) {
          const names = new Intl.DisplayNames(["zh-CN"], { type: "region" });
          const localized = names.of(code);
          if (localized && localized !== code) return localized;
        }
      } catch (_) {
        // Ignore and fallback to existing name.
      }
      return fallbackName || code;
    }

    function getFlagEmoji(iso3) {
      const target = WORLD_COUNTRIES.find((c) => c.iso3 === iso3);
      if (!target || !target.iso2 || target.iso2.length !== 2) return "🇺🇳";
      const iso2 = target.iso2.toUpperCase();
      if (!/^[A-Z]{2}$/.test(iso2)) return "🇺🇳";
      const base = 127397;
      return String.fromCodePoint(iso2.charCodeAt(0) + base, iso2.charCodeAt(1) + base);
    }

    function buildTooltipHtmlFromRecord(rec) {
      const type = rec.type || "常规签";
      const easeHtml = getEaseDisplayHtml(type, Number(rec.difficulty || 0));
      const diffHtml = easeHtml
        ? "<div class='map-tooltip-label'>签证容易度</div><div class='map-tooltip-value'>" + easeHtml + "</div>"
        : "";
      return (
        "<div class='map-tooltip-title'>" + getFlagEmoji(rec.iso3) + " " + escapeHtml(rec.country || "未知") +
        "<span class='map-tooltip-chip " + getChipClass(type) + "'>" + escapeHtml(type) + "</span></div>" +
        diffHtml +
        "<div class='map-tooltip-label'>签证要求</div><div class='map-tooltip-value'>" + escapeHtml(rec.rawRequirement || "无") + "</div>" +
        "<div class='map-tooltip-label'>停留</div><div class='map-tooltip-value'>" + escapeHtml(rec.stay || "无") + "</div>" +
        "<div class='map-tooltip-label'>备注</div><div class='map-tooltip-value'>" + escapeHtml(rec.note || "无") + "</div>"
      );
    }

    function getVisaApplyLink(rec) {
      const iso3 = norm(rec && rec.iso3).toUpperCase();
      if (iso3 && POPULAR_VISA_LINKS_BY_ISO3[iso3]) return POPULAR_VISA_LINKS_BY_ISO3[iso3];
      const text = [rec && rec.rawRequirement, rec && rec.note].filter(Boolean).join(" ");
      const match = text.match(/https?:\/\/[^\s)]+/i);
      return match ? match[0] : "";
    }

    function getGoogleMapsLink(rec) {
      const countryQuery = norm((rec && (rec.country_en || rec.country)) || "");
      if (!countryQuery) return "";
      return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(countryQuery);
    }

    function buildPanelLinksHtml(rec) {
      const visaUrl = getVisaApplyLink(rec);
      const mapUrl = getGoogleMapsLink(rec);
      const visaRowHtml = visaUrl
        ? ("<div class='panel-link-row'><a href='" + escapeHtml(visaUrl) + "' target='_blank' rel='noopener noreferrer'>签证申请/官方页面</a></div>")
        : "";
      const mapLinkHtml = mapUrl
        ? ("<a href='" + escapeHtml(mapUrl) + "' target='_blank' rel='noopener noreferrer'>在 Google 地图查看位置</a>")
        : "<span>Google 地图链接：暂无</span>";
      return (
        "<div class='panel-links'>" +
        visaRowHtml +
        "<div class='panel-link-row'>" + mapLinkHtml + "</div>" +
        "</div>"
      );
    }

    function enrichRecordForPanel(rec) {
      if (!rec) return rec;
      const byIso = rec.iso3 ? allRows.find((r) => r.iso3 === rec.iso3) : null;
      const byName = !byIso && rec.country ? allRows.find((r) => r.country === rec.country) : null;
      const full = byIso || byName || {};
      return {
        country: rec.country || full.country || "未知",
        country_en: rec.country_en || full.country_en || "",
        type: rec.type || full.type || "常规签",
        rawRequirement: rec.rawRequirement || full.rawRequirement || "",
        stay: rec.stay || full.stay || "",
        note: rec.note || full.note || "",
        iso3: rec.iso3 || full.iso3 || "",
        difficulty: Number(rec.difficulty || full.difficulty || 0)
      };
    }

    function openCountryPanel(rec) {
      if (!countryPanelEl || !countryPanelBodyEl || !rec) return;
      const enriched = enrichRecordForPanel(rec);
      countryPanelBodyEl.innerHTML = buildTooltipHtmlFromRecord(enriched) + buildPanelLinksHtml(enriched);
      countryPanelEl.classList.add("is-open");
      countryPanelEl.setAttribute("aria-hidden", "false");
    }

    function placeFixedTooltip(tooltipEl, evt) {
      if (!tooltipEl || !evt) return;
      const tipRect = tooltipEl.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const pad = 12;
      let left = evt.clientX + 14;
      let top = evt.clientY + 14;
      if (left + tipRect.width > vw - pad) left = vw - tipRect.width - pad;
      if (top + tipRect.height > vh - pad) top = vh - tipRect.height - pad;
      if (left < pad) left = pad;
      if (top < pad) top = pad;
      tooltipEl.style.left = left + "px";
      tooltipEl.style.top = top + "px";
    }

      };

        2: { color: "#22c55e" },

        4: { color: "#fb8c00" },

      };
      const groups = mapColorMode === "difficulty"
        ? [

            { key: "电子签", rows: mapRows.filter((r) => r.type === "电子签"), color: typeMeta["电子签"].color },
            { key: "常规签", rows: mapRows.filter((r) => r.type === "常规签"), color: typeMeta["常规签"].color }

      const noDataCustom = noDataRows.map((c) => [

        c.name,
        c.iso3
      ]);

      const noDataTrace = {
        type: "choropleth",
        locationmode: "ISO-3",

        marker: {
          line: {
            color: "#ffffff",

          r.country,

          formatHoverText(r.rawRequirement, 34),
          formatHoverText(r.stay, 34),

        marker: {
          line: {
            color: "#ffffff",
            width: 0.3
          }
        },
        showscale: false,
        hoverlabel: hoverLabelStyle
      });

      // Comprehensive tiny-country coordinate fallback to guarantee visibility.
      const forcedCoords = {
        AND: { lon: 1.52, lat: 42.51 }, ANT: { lon: -68.99, lat: 12.19 }, ATG: { lon: -61.79, lat: 17.12 },
        BHR: { lon: 50.55, lat: 26.07 }, BHS: { lon: -77.40, lat: 25.03 }, BRB: { lon: -59.56, lat: 13.19 },
        BRN: { lon: 114.73, lat: 4.53 }, COM: { lon: 43.33, lat: -11.70 }, CPV: { lon: -23.60, lat: 15.12 },
        CYP: { lon: 33.43, lat: 35.13 }, DMA: { lon: -61.37, lat: 15.41 }, DOM: { lon: -70.16, lat: 18.74 },
        FJI: { lon: 178.07, lat: -17.71 }, FSM: { lon: 158.20, lat: 6.88 }, GRD: { lon: -61.68, lat: 12.12 },
        KIR: { lon: 173.03, lat: 1.87 }, KNA: { lon: -62.75, lat: 17.35 },
        KWT: { lon: 47.48, lat: 29.38 }, LCA: { lon: -60.98, lat: 13.91 }, LIE: { lon: 9.56, lat: 47.17 },
        LUX: { lon: 6.13, lat: 49.82 }, MCO: { lon: 7.42, lat: 43.73 },
        MDA: { lon: 28.86, lat: 47.01 }, MDV: { lon: 73.50, lat: 4.17 }, MHL: { lon: 171.18, lat: 7.13 },
        MLT: { lon: 14.38, lat: 35.94 }, MUS: { lon: 57.55, lat: -20.20 }, NRU: { lon: 166.93, lat: -0.52 },
        PLW: { lon: 134.58, lat: 7.51 }, QAT: { lon: 51.18, lat: 25.35 }, SMR: { lon: 12.45, lat: 43.94 },
        SGP: { lon: 103.82, lat: 1.35 }, SLB: { lon: 160.16, lat: -9.65 }, STP: { lon: 6.73, lat: 0.19 },
        SYC: { lon: 55.49, lat: -4.68 }, TLS: { lon: 125.73, lat: -8.56 }, TON: { lon: -175.20, lat: -21.18 },
        TTO: { lon: -61.22, lat: 10.69 }, TUV: { lon: 177.65, lat: -7.11 }, VAT: { lon: 12.45, lat: 41.90 },
        VCT: { lon: -61.20, lat: 13.25 }, VUT: { lon: 166.96, lat: -15.38 }, WSM: { lon: -172.10, lat: -13.76 }
      };
      const forcedData = [];
      const forcedNoData = [];
      Object.keys(forcedCoords).forEach((iso3) => {
        if (mapByIso.has(iso3)) {
          const r = mapByIso.get(iso3);
          forcedData.push({
            iso3,
            lon: forcedCoords[iso3].lon,
            lat: forcedCoords[iso3].lat,
            custom: [
              r.country,
              r.type,
              formatHoverText(r.rawRequirement, 34),
              formatHoverText(r.stay, 34),
              formatHoverText(r.note, 34),
              r.iso3,
              r.difficulty || 0
            ],
            color: mapColorMode === "difficulty"
              ? (difficultyMeta[Number(r.difficulty) || 1]?.color || "#3b82f6")
              : (
                r.type === "免签" ? "#3b82f6" :
                r.type === "落地签" ? "#22c55e" :
                r.type === "电子签" ? "#facc15" : "#6b7280"
              )
          });
        } else if (noDataByIso.has(iso3)) {
          const c = noDataByIso.get(iso3);
          forcedNoData.push({
            iso3,
            lon: forcedCoords[iso3].lon,
            lat: forcedCoords[iso3].lat,
            custom: [getRegionDisplayName(c.iso2, c.name), c.name, iso3]
          });
        }
      });

      const forcedNoDataTrace = {
        type: "scattergeo",
        mode: "markers",
        lon: forcedNoData.map((x) => x.lon),
        lat: forcedNoData.map((x) => x.lat),
        marker: {
          size: tinyMarkerSize,
          color: "#9ca3af",
          line: { color: "#ffffff", width: 1.1 },
          opacity: 0.98
        },
        customdata: forcedNoData.map((x) => x.custom),
        hoverinfo: "none",
        showlegend: false,
        hoverlabel: hoverLabelStyle
      };

      const forcedDataTrace = {
        type: "scattergeo",
        mode: "markers",
        lon: forcedData.map((x) => x.lon),
        lat: forcedData.map((x) => x.lat),
        marker: {
          size: tinyMarkerSize,
          color: forcedData.map((x) => x.color),
          line: { color: "#ffffff", width: 1.1 },
          opacity: 0.98
        },
        customdata: forcedData.map((x) => x.custom),
        hoverinfo: "none",
        showlegend: false,
        hoverlabel: hoverLabelStyle
      };

      // Lightweight hover highlight: slightly brighten hovered country fill.
      const hoverFillTrace = {
        type: "choropleth",
        locationmode: "ISO-3",
        locations: [],
        z: [],
        hoverinfo: "skip",
        showscale: false,
        colorscale: [[0, "rgba(255,255,255,0.14)"], [1, "rgba(255,255,255,0.14)"]],
        marker: { line: { width: 0 } }
      };
      const hoverPointTrace = {
        type: "scattergeo",
        mode: "markers",
        lon: [],
        lat: [],
        hoverinfo: "skip",
        showlegend: false,
        marker: {
          size: tinyMarkerSize + 3.2,
          color: "rgba(255,255,255,0)",
          line: { color: "#ffffff", width: 1.6 },
          opacity: 1
        }
      };

      const css = getComputedStyle(document.body);
      const mapBg = css.getPropertyValue("--map-bg").trim() || "#ffffff";
      const mapCoast = css.getPropertyValue("--map-coast").trim() || "#d1d5db";
      const mapCountry = css.getPropertyValue("--map-country").trim() || "#a8b3c2";
      const mapLand = css.getPropertyValue("--map-land").trim() || "#d1d5db";
      const mapOcean = css.getPropertyValue("--map-ocean").trim() || "#e6f2ff";
      const mapLake = css.getPropertyValue("--map-lake").trim() || "#cfe8ff";

      const layout = {
        dragmode: "pan",
        margin: { l: 0, r: 0, t: 0, b: 0 },
        paper_bgcolor: mapBg,
        geo: {
          scope: "world",
          projection: { type: "equirectangular" },
          showframe: false,
          showcoastlines: true,
          coastlinecolor: mapCoast,
          coastlinewidth: 0.6,
          showcountries: true,
          countrycolor: mapCountry,
          countrywidth: 0.45,
          showland: true,
          landcolor: mapLand,
          showocean: true,
          oceancolor: mapOcean,
          showlakes: true,
          lakecolor: mapLake,
          bgcolor: mapBg
        }
      };

      const groupCount = groups.length;
      mapForcedNoDataTraceIdx = 1 + groupCount;
      mapForcedDataTraceIdx = mapForcedNoDataTraceIdx + 1;
      mapHoverFillTraceIdx = mapForcedNoDataTraceIdx + 2;
      mapHoverPointTraceIdx = mapForcedNoDataTraceIdx + 3;

      Plotly.react(
        worldMapEl,
        [
          noDataTrace,
          ...groups.map((g) => makeGroupTrace(g)),
          forcedNoDataTrace,
          forcedDataTrace,
          hoverFillTrace,
          hoverPointTrace
        ],
        layout,
        {
        responsive: true,
        displayModeBar: false,
        scrollZoom: true,
        hoverdistance: 3
        }
      );

      bindMapScaleListener();
      bindCustomTooltip();
    }

    function getTinyMarkerSize(scale) {
      const s = Number(scale) || 1;
      // Keep tiny-country hit area modest on zoomed-out maps,
      // then grow progressively as user zooms in.
      return Math.max(1.5, Math.min(7.2, 1.85 + Math.pow(Math.max(0, s - 1), 1.22) * 2.05));
    }

    function bindMapScaleListener() {
      if (worldMapEl.__scaleListenerBound) return;
      worldMapEl.__scaleListenerBound = true;
      let scaleDebounceTimer = null;
      let lastAppliedSize = getTinyMarkerSize(mapGeoScale);

      const applyScale = (scale) => {
        const s = Number(scale);
        if (!s || Number.isNaN(s)) return;
        mapGeoScale = s;
        const nextSize = getTinyMarkerSize(mapGeoScale);
        // Skip tiny size changes to reduce expensive restyle calls.
        if (Math.abs(nextSize - lastAppliedSize) < 0.45) return;
        lastAppliedSize = nextSize;
        Plotly.restyle(worldMapEl, { "marker.size": nextSize }, [mapForcedNoDataTraceIdx, mapForcedDataTraceIdx]);
        Plotly.restyle(worldMapEl, { "marker.size": nextSize + 3.2 }, [mapHoverPointTraceIdx]);
      };

      const scheduleApply = (scale) => {
        if (scaleDebounceTimer) clearTimeout(scaleDebounceTimer);
        scaleDebounceTimer = setTimeout(() => applyScale(scale), 80);
      };

      worldMapEl.on("plotly_relayout", (evt) => {
        const nextScale = evt && typeof evt["geo.projection.scale"] === "number"
          ? evt["geo.projection.scale"]
          : null;
        if (!nextScale) return;
        scheduleApply(nextScale);
      });
    }

    function bindCustomTooltip() {
      if (worldMapEl.__customTooltipBound) return;
      worldMapEl.__customTooltipBound = true;
      let lastHoverIso3 = "";
      let lastHoverPointKey = "";
      let tooltipActive = false;
      let pointerDownOnMap = false;
      let mapInteracting = false;
      let downX = 0;
      let downY = 0;

      const placeTooltip = (evt) => {
        if (!mapTooltipEl) return;
        const mapRect = worldMapEl.getBoundingClientRect();
        const tipRect = mapTooltipEl.getBoundingClientRect();
        const pad = 12;
        let left = evt.clientX - mapRect.left + 14;
        let top = evt.clientY - mapRect.top + 14;
        if (left + tipRect.width > mapRect.width - pad) left = mapRect.width - tipRect.width - pad;
        if (top + tipRect.height > mapRect.height - pad) top = mapRect.height - tipRect.height - pad;
        if (left < pad) left = pad;
        if (top < pad) top = pad;
        mapTooltipEl.style.left = left + "px";
        mapTooltipEl.style.top = top + "px";
      };

      worldMapEl.on("plotly_beforehover", () => {
        // Hard-stop hover during drag/zoom interactions.
        return !(pointerDownOnMap || mapInteracting);
      });

      worldMapEl.on("plotly_hover", (e) => {
        if (pointerDownOnMap || mapInteracting) return;
        if (!mapTooltipEl || !e || !e.points || !e.points.length) return;
        const p = e.points[0];
        const d = p.customdata || [];
        let hoverIso3 = "";
        let flag = "🇺🇳";
        const isPointHover = p && p.fullData && p.fullData.type === "scattergeo";
        // Keep point hover behavior stable; avoid over-filtering point hits here.

        const renderTooltip = () => {
          if (d.length >= 5) {
            const type = d[1] || "常规签";
            hoverIso3 = (typeof p.location === "string" && p.location.length === 3) ? p.location : (d[5] || "");
            mapTooltipEl.innerHTML = buildTooltipHtmlFromRecord({
              country: d[0],
              type,
              rawRequirement: d[2],
              stay: d[3],
              note: d[4],
              iso3: hoverIso3,
              difficulty: Number(d[6] || 0)
            });
          } else {
            hoverIso3 = (typeof p.location === "string" && p.location.length === 3) ? p.location : (d[2] || "");
            flag = getFlagEmoji(hoverIso3);
            const name = d[0] || "未知";
            mapTooltipEl.innerHTML =
              "<div class='map-tooltip-title'>" + flag + " " + escapeHtml(name) + "</div>" +
              "<div class='map-tooltip-chip chip-regular'>无签证信息</div>";
          }

          mapTooltipEl.style.display = "block";
          tooltipActive = true;
          if (e.event) placeTooltip(e.event);

          // Lightweight hover highlight by brightening hovered country fill.
          if (hoverIso3 && hoverIso3 !== lastHoverIso3) {
            lastHoverIso3 = hoverIso3;
            Plotly.restyle(worldMapEl, { locations: [[hoverIso3]], z: [[1]] }, [mapHoverFillTraceIdx]);
          }
          if (isPointHover && typeof p.lon === "number" && typeof p.lat === "number") {
            const pointKey = p.lon.toFixed(4) + "," + p.lat.toFixed(4);
            if (pointKey !== lastHoverPointKey) {
              lastHoverPointKey = pointKey;
              Plotly.restyle(worldMapEl, { lon: [[p.lon]], lat: [[p.lat]] }, [mapHoverPointTraceIdx]);
            }
          } else {
            if (lastHoverPointKey) {
              lastHoverPointKey = "";
              Plotly.restyle(worldMapEl, { lon: [[]], lat: [[]] }, [mapHoverPointTraceIdx]);
            }
          }
        };

        renderTooltip();
      });
      worldMapEl.on("plotly_unhover", () => {
        if (mapTooltipEl) mapTooltipEl.style.display = "none";
        tooltipActive = false;
        if (lastHoverIso3) {
          lastHoverIso3 = "";
          Plotly.restyle(worldMapEl, { locations: [[]], z: [[]] }, [mapHoverFillTraceIdx]);
        }
        if (lastHoverPointKey) {
          lastHoverPointKey = "";
          Plotly.restyle(worldMapEl, { lon: [[]], lat: [[]] }, [mapHoverPointTraceIdx]);
        }
      });

      worldMapEl.on("plotly_relayouting", () => {
        mapInteracting = true;
        if (mapTooltipEl) mapTooltipEl.style.display = "none";
        tooltipActive = false;
      });
      worldMapEl.on("plotly_relayout", () => {
        mapInteracting = false;
        if (lastHoverIso3) {
          lastHoverIso3 = "";
          Plotly.restyle(worldMapEl, { locations: [[]], z: [[]] }, [mapHoverFillTraceIdx]);
        }
        if (lastHoverPointKey) {
          lastHoverPointKey = "";
          Plotly.restyle(worldMapEl, { lon: [[]], lat: [[]] }, [mapHoverPointTraceIdx]);
        }
      });

      worldMapEl.addEventListener("pointerdown", (evt) => {
        pointerDownOnMap = true;
        mapInteracting = true;
        downX = evt.clientX;
        downY = evt.clientY;
        if (mapTooltipEl) mapTooltipEl.style.display = "none";
        tooltipActive = false;
      });
      window.addEventListener("pointerup", () => {
        pointerDownOnMap = false;
        // Allow Plotly a short settle window before restoring hover.
        setTimeout(() => {
          mapInteracting = false;
        }, 40);
      });

      worldMapEl.addEventListener("mousemove", (evt) => {
        if (pointerDownOnMap) {
          const dx = Math.abs(evt.clientX - downX);
          const dy = Math.abs(evt.clientY - downY);
          if (dx + dy > 5) mapInteracting = true;
        }
        if (!tooltipActive || !mapTooltipEl || mapTooltipEl.style.display === "none") return;
        placeTooltip(evt);
      });
    }

    function scheduleMapRender(rows) {
      if (mapRenderTimer) {
        clearTimeout(mapRenderTimer);
      }
      mapRenderTimer = setTimeout(() => {
        renderMap(rows);
      }, 220);
    }

    render();
    scheduleMapRender(allRows);
  </script>
</body>
</html>
